<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vietgem · VND → AUD</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --navy:     #1a1a2e;
            --red-vn:   #da251d;
            --gold-vn:  #ffcd00;
            --green-au: #00843d;
            --blue-au:  #00008b;
            --bg:       #f0f2f5;
            --card:     #ffffff;
            --text:     #1a1a2e;
            --muted:    #6b7280;
            --border:   #e5e7eb;
            --radius:   18px;
            --shadow:   0 4px 24px rgba(0,0,0,0.10);
        }

        html, body {
            height: 100%;
            background: var(--bg);
            font-family: 'Inter', 'Segoe UI', sans-serif;
            color: var(--text);
        }

        /* ── Back link ── */
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.75rem 1.25rem;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--muted);
            text-decoration: none;
            letter-spacing: 0.01em;
        }
        .back-link:hover { color: var(--text); }

        /* ── App wrapper ── */
        .app {
            max-width: 430px;
            margin: 0 auto;
            padding: 0 1rem 2.5rem;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ── Hero header ── */
        .hero {
            background: linear-gradient(145deg, var(--navy) 0%, #16213e 60%, #0f3460 100%);
            border-radius: 0 0 32px 32px;
            padding: 2.5rem 1.5rem 2rem;
            text-align: center;
            color: white;
            margin: 0 -1rem 1.75rem;
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: -40px; right: -40px;
            width: 180px; height: 180px;
            background: radial-gradient(circle, rgba(218,37,29,0.18) 0%, transparent 70%);
            border-radius: 50%;
        }
        .hero::after {
            content: '';
            position: absolute;
            bottom: -30px; left: -30px;
            width: 160px; height: 160px;
            background: radial-gradient(circle, rgba(255,205,0,0.12) 0%, transparent 70%);
            border-radius: 50%;
        }

        .flags {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            margin-bottom: 1.25rem;
            font-size: 2.6rem;
            line-height: 1;
            position: relative;
            z-index: 1;
        }

        .flag-arrow {
            font-size: 1.1rem;
            opacity: 0.7;
        }

        .hero h1 {
            font-size: 2.4rem;
            font-weight: 800;
            letter-spacing: -0.03em;
            position: relative;
            z-index: 1;
        }

        .hero h1 span {
            background: linear-gradient(90deg, var(--gold-vn), #fff8cc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .hero-sub {
            font-size: 0.9rem;
            color: rgba(255,255,255,0.6);
            margin-top: 0.4rem;
            font-weight: 400;
            letter-spacing: 0.02em;
            position: relative;
            z-index: 1;
        }

        /* ── Card base ── */
        .card {
            background: var(--card);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 1.5rem;
            margin-bottom: 1rem;
        }

        /* ── Input section ── */
        .input-label {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.78rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--muted);
            margin-bottom: 0.75rem;
        }

        .input-label .flag-sm { font-size: 1.15rem; }

        .input-wrapper {
            display: flex;
            align-items: center;
            background: #f8f9fb;
            border: 2px solid var(--border);
            border-radius: 14px;
            padding: 0.75rem 1rem;
            transition: border-color 0.2s;
        }
        .input-wrapper:focus-within {
            border-color: var(--red-vn);
            background: #fff;
        }

        .currency-symbol {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--red-vn);
            margin-right: 0.5rem;
            flex-shrink: 0;
        }

        #vnd-input {
            flex: 1;
            border: none;
            background: transparent;
            font-family: 'Inter', sans-serif;
            font-size: 1.9rem;
            font-weight: 700;
            color: var(--text);
            outline: none;
            width: 100%;
            min-width: 0;
        }
        #vnd-input::placeholder { color: #d1d5db; }

        .clear-btn {
            background: none;
            border: none;
            color: #9ca3af;
            cursor: pointer;
            padding: 0.25rem;
            font-size: 1.1rem;
            flex-shrink: 0;
            display: none;
            align-items: center;
            justify-content: center;
        }
        .clear-btn.visible { display: flex; }
        .clear-btn:hover { color: var(--text); }

        /* ── Result section ── */
        .result-label {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.78rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--muted);
            margin-bottom: 0.75rem;
        }

        .result-display {
            display: flex;
            align-items: baseline;
            gap: 0.4rem;
            min-height: 3.5rem;
        }

        .result-symbol {
            font-size: 1.75rem;
            font-weight: 800;
            color: var(--green-au);
        }

        .result-amount {
            font-size: 3rem;
            font-weight: 800;
            color: var(--text);
            letter-spacing: -0.04em;
            transition: opacity 0.15s;
        }

        .result-amount.placeholder {
            color: #d1d5db;
        }

        .result-cents {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--muted);
            letter-spacing: -0.02em;
            align-self: flex-end;
            margin-bottom: 0.2rem;
        }

        /* ── Rate info ── */
        .rate-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            background: #f0fdf4;
            border: 1px solid #bbf7d0;
            border-radius: 999px;
            padding: 0.35rem 0.75rem;
            font-size: 0.78rem;
            font-weight: 500;
            color: #166534;
            margin-top: 1rem;
        }
        .rate-dot {
            width: 6px; height: 6px;
            background: var(--green-au);
            border-radius: 50%;
        }

        /* ── Divider ── */
        .divider {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin: 0.25rem 0;
        }
        .divider-line {
            flex: 1;
            height: 1px;
            background: var(--border);
        }
        .divider-icon {
            color: #9ca3af;
            font-size: 1.1rem;
        }

        /* ── Quick amounts ── */
        .quick-title {
            font-size: 0.78rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--muted);
            margin-bottom: 0.9rem;
        }

        .quick-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.6rem;
        }

        .quick-btn {
            background: #f8f9fb;
            border: 1.5px solid var(--border);
            border-radius: 12px;
            padding: 0.65rem 0.5rem;
            cursor: pointer;
            text-align: center;
            transition: all 0.15s;
            font-family: 'Inter', sans-serif;
        }
        .quick-btn:hover, .quick-btn:active {
            background: var(--navy);
            border-color: var(--navy);
            transform: scale(0.97);
        }
        .quick-btn:hover .qb-vnd,
        .quick-btn:active .qb-vnd { color: rgba(255,255,255,0.7); }
        .quick-btn:hover .qb-aud,
        .quick-btn:active .qb-aud { color: white; }

        .qb-vnd {
            font-size: 0.7rem;
            font-weight: 500;
            color: var(--muted);
            margin-bottom: 0.2rem;
            transition: color 0.15s;
        }
        .qb-aud {
            font-size: 0.95rem;
            font-weight: 700;
            color: var(--text);
            transition: color 0.15s;
        }

        /* ── Footer note ── */
        .footer-note {
            text-align: center;
            font-size: 0.75rem;
            color: #9ca3af;
            margin-top: auto;
            padding-top: 1.5rem;
        }
    </style>
</head>
<body>

<div class="app">

    <a class="back-link" href="../../index.html">← Portfolio</a>

    <div class="hero">
        <div class="flags">
            <span>🇻🇳</span>
            <span class="flag-arrow">✈️</span>
            <span>🇦🇺</span>
        </div>
        <h1><span>Vietgem</span></h1>
        <p class="hero-sub">Vietnamese Dong → Australian Dollar</p>
    </div>

    <!-- VND Input -->
    <div class="card">
        <div class="input-label">
            <span class="flag-sm">🇻🇳</span> Vietnamese Dong (VND)
        </div>
        <div class="input-wrapper">
            <span class="currency-symbol">₫</span>
            <input
                id="vnd-input"
                type="text"
                inputmode="numeric"
                placeholder="0"
                autocomplete="off"
                autocorrect="off"
            >
            <button class="clear-btn" id="clear-btn" aria-label="Clear">✕</button>
        </div>
    </div>

    <div class="divider">
        <div class="divider-line"></div>
        <span class="divider-icon">⬇</span>
        <div class="divider-line"></div>
    </div>

    <!-- AUD Result -->
    <div class="card">
        <div class="result-label">
            <span class="flag-sm">🇦🇺</span> Australian Dollar (AUD)
        </div>
        <div class="result-display">
            <span class="result-symbol" id="result-symbol">$</span>
            <span class="result-amount placeholder" id="result-dollars">0</span>
            <span class="result-cents" id="result-cents">.00</span>
        </div>
        <div class="rate-badge">
            <span class="rate-dot"></span>
            1 AUD = ₫18,607.90
        </div>
    </div>

    <!-- Quick reference -->
    <div class="card">
        <div class="quick-title">Quick Reference</div>
        <div class="quick-grid" id="quick-grid"></div>
    </div>

    <p class="footer-note">Rate fixed · 1 AUD = 18,607.9 VND</p>

</div>

<script>
    const RATE = 18607.9; // 1 AUD = this many VND

    const input       = document.getElementById('vnd-input');
    const clearBtn    = document.getElementById('clear-btn');
    const resultDols  = document.getElementById('result-dollars');
    const resultCents = document.getElementById('result-cents');
    const quickGrid   = document.getElementById('quick-grid');

    // ── Quick reference amounts (VND) ──
    const quickAmounts = [
        50_000, 100_000, 200_000,
        500_000, 1_000_000, 2_000_000
    ];

    function formatVND(n) {
        return n.toLocaleString('en-AU');
    }

    function vndToAud(vnd) {
        return vnd / RATE;
    }

    function formatAUD(aud) {
        const dollars = Math.floor(aud);
        const cents   = Math.round((aud - dollars) * 100);
        return {
            dollars: dollars.toLocaleString('en-AU'),
            cents:   '.' + String(cents).padStart(2, '0')
        };
    }

    function updateResult(rawVND) {
        if (!rawVND || rawVND === 0) {
            resultDols.textContent = '0';
            resultDols.classList.add('placeholder');
            resultCents.textContent = '.00';
            return;
        }
        const aud = vndToAud(rawVND);
        const { dollars, cents } = formatAUD(aud);
        resultDols.textContent = dollars;
        resultDols.classList.remove('placeholder');
        resultCents.textContent = cents;
    }

    // ── Input handling ──
    input.addEventListener('input', () => {
        // Strip non-digits
        const raw = input.value.replace(/\D/g, '');
        const num = parseInt(raw, 10) || 0;

        // Reformat with thousands separators
        if (raw === '') {
            input.value = '';
        } else {
            // Store cursor relative to end before replacing
            input.value = num.toLocaleString('en-AU');
        }

        clearBtn.classList.toggle('visible', raw.length > 0);
        updateResult(num);
    });

    clearBtn.addEventListener('click', () => {
        input.value = '';
        clearBtn.classList.remove('visible');
        updateResult(0);
        input.focus();
    });

    // ── Quick reference buttons ──
    quickAmounts.forEach(vnd => {
        const aud = vndToAud(vnd);
        const { dollars, cents } = formatAUD(aud);

        const btn = document.createElement('button');
        btn.className = 'quick-btn';
        btn.innerHTML = `
            <div class="qb-vnd">₫${formatVND(vnd)}</div>
            <div class="qb-aud">$${dollars}${cents}</div>
        `;
        btn.addEventListener('click', () => {
            input.value = formatVND(vnd);
            clearBtn.classList.add('visible');
            updateResult(vnd);
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });
        quickGrid.appendChild(btn);
    });
</script>

</body>
</html>
